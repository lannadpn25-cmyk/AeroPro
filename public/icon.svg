<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Dark slate gradient for background -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#121318" />
      <stop offset="100%" stop-color="#0A0A0C" />
    </linearGradient>
    
    <!-- Neon lime-green glowing gradient -->
    <linearGradient id="neon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D9FF33" />
      <stop offset="100%" stop-color="#CCFF00" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Squircle (rounded square) background -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg-grad)" stroke="#22252C" stroke-width="6" />

  <!-- Ambient glowing circle background -->
  <circle cx="256" cy="256" r="140" fill="#CCFF00" opacity="0.08" filter="url(#glow)" />

  <!-- High-contrast athletic emblem: Aerodynamic Speed Flame & Progress Waves -->
  <g transform="translate(136, 126)">
    <!-- Speed wave 1 (bottom-left) -->
    <path d="M -20,170 C 0,170 10,130 50,130 C 70,130 85,145 95,160" stroke="#CCFF00" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.4" />
    
    <!-- Speed wave 2 (middle) -->
    <path d="M 10,210 C 35,210 50,170 90,170 C 115,170 130,190 145,210" stroke="#CCFF00" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.7" />
    
    <!-- Main progressive flame/speed wing -->
    <path d="M 60,230 C 180,210 205,80 95,-10 C 110,60 50,100 20,150 C -10,200 15,240 60,230 Z" fill="url(#neon-grad)" filter="url(#glow)" />
    
    <!-- Inner design slash for high-performance aesthetic -->
    <path d="M 75,130 C 105,100 125,50 115,15" stroke="#121318" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.85" />
  </g>
</svg>
